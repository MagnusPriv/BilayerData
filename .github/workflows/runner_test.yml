name: Zenodo speedtest on runner

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  AddData:
    runs-on: nrec-large
    environment: user_data_addition
    timeout-minutes: 1440
    container:
      image: nmrlipids/core
      options: --user root
    env:
      FMDL_DATA_PATH: ${{ github.workspace }}/BilayerData
      MEM_CUTOFF: 1500000000

    steps:
      - name: Show host + persistent01 info
        run: |
          echo "Host: $(hostname)"
          echo
          echo "pwd: $(pwd)"
          df -h /
          df -h /persistent01 || true
          ls -al /persistent01 || true
          
      - name: Show MTU inside job container
        run: |
          echo "=== ip link show eth0 ==="
          ip link show eth0 || true
          echo
          echo "=== MTU via sysfs ==="
          cat /sys/class/net/eth0/mtu || true

      - name: Download via host docker (nmrlipids/core)
        run: |
          sudo docker run --rm \
            --user root \
            -v /persistent01:/persistent01 \
            nmrlipids/core \
            bash -lc '
              apt-get update &&
              apt-get install -y wget &&
              cd /persistent01 &&
              wget -4 -O production_ci_hostdocker.xtc "https://zenodo.org/records/10261345/files/production.xtc?download=1"
            '
      
